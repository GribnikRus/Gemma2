

services:
  redis:
    image: redis:7-alpine
    container_name: gemma-hub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build: .
    container_name: gemma-hub-app
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0?health_check_interval=30
    volumes:
      - ./uploads:/app/uploads
      - db_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  db_data:

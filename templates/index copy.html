<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #1a1a2e;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        
        #app-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #16213e;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            border-right: 1px solid #0f3460;
        }
        
        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }
        
        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .chat-item, .group-item {
            padding: 10px;
            margin: 5px 0;
            background: #0f3460;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        
        .chat-item:hover, .group-item:hover {
            background: #e94560;
        }
        
        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
        }
        
        .chat-header {
            padding: 20px;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        
        .chat-info h3 {
            color: white;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* Model Selectors */
        .model-selector {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .model-selector select {
            background: #0f3460;
            color: white;
            border: 1px solid #e94560;
            border-radius: 6px;
            padding: 5px 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .model-selector select:hover {
            border-color: #ff6b6b;
        }
        
        .model-selector select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* AI Switch */
        .ai-switch {
            display: inline-block;
            width: 44px;
            height: 22px;
            position: relative;
            cursor: pointer;
        }
        
        .ai-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 22px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #e94560;
        }
        
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        
        /* AI Status */
        .ai-status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #0f3460;
            padding: 5px 10px;
            border-radius: 20px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .message.user {
            align-self: flex-end;
            background: #e94560;
        }
        
        .message.ai {
            align-self: flex-start;
            background: #0f3460;
        }
        
        .msg-sender {
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        
        .msg-content {
            word-wrap: break-word;
        }
        
        .msg-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        /* Input Area */
        .input-area {
            padding: 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        textarea {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            resize: none;
            font-family: inherit;
            background: #0f3460;
            color: white;
        }
        
        textarea::placeholder {
            color: #888;
        }
        
        .send-btn {
            padding: 10px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .send-btn:hover {
            background: #ff6b6b;
        }
        
        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        
        .tool-btn {
            padding: 8px 15px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .tool-btn.active {
            background: #e94560;
        }
        
        /* Right Panel */
        .right-panel {
            width: 300px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #0f3460;
        }
        
        .hidden {
            display: none;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .overlay.active {
            display: block;
        }
        
        .mobile-only {
            display: none;
        }
        
        .desktop-only {
            display: block;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 1001;
            }
            .sidebar.open {
                transform: translateX(280px);
            }
            .mobile-only {
                display: block;
            }
            .desktop-only {
                display: none;
            }
            .right-panel {
                position: fixed;
                right: -300px;
                top: 0;
                bottom: 0;
                z-index: 1001;
            }
            .right-panel.open {
                transform: translateX(-300px);
            }
        }
        
        .btn-sm {
            background: #3390ec;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .results-box {
            background: #0f3460;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .typing-indicator.hidden {
            display: none;
        }
        
        .dot {
            animation: blink 1.4s infinite;
            font-size: 1.5rem;
        }
        
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes blink {
            0%, 60%, 100% { opacity: 0; }
            30% { opacity: 1; }
        }
        
        .empty-state {
            padding: 10px;
            color: #707579;
            text-align: center;
        }
        
        .online-list li {
            padding: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="overlay" id="overlay"></div>
        
        <!-- Левая панель -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">U</div>
                    <span id="user-display">User</span>
                </div>
                <button id="logout-btn" class="icon-btn">🚪</button>
            </div>
            
            <div class="chat-list-container">
                <h4 style="padding:5px; color:#707579;">ЧАТЫ</h4>
                <div id="chats-list"></div>
                
                <h4 style="padding:5px; color:#707579; margin-top:15px;">ГРУППЫ</h4>
                <div id="groups-list"></div>
                <div style="display:flex; gap:5px; padding:5px; margin-top:5px;">
                    <input type="text" id="new-group-name" placeholder="Название группы" style="flex:1; padding:5px; border-radius:4px; border:1px solid #0f3460; background:#0f3460; color:white;">
                    <button id="create-group-btn" class="btn-sm">+</button>
                </div>
                
                <h4 style="padding:5px; color:#707579; margin-top:15px;">ОНЛАЙН</h4>
                <ul id="users-list-container" class="online-list" style="list-style:none; padding:5px;"></ul>
            </div>
            <button id="new-chat-btn" style="position:absolute; bottom:20px; right:20px; width:50px; height:50px; border-radius:50%; background:#e94560; color:white; border:none; font-size:1.5rem; cursor:pointer;">✏️</button>
        </aside>

        <!-- Центр чата -->
        <main class="main-chat">
            <header class="chat-header">
                <button id="menu-toggle" class="icon-btn mobile-only" style="font-size:1.5rem; margin-right:10px;">☰</button>
                <div class="chat-info">
                    <h3 id="current-chat-title">Выберите чат</h3>
                    <span id="chat-status" class="status-text"></span>
                </div>
                <div class="header-actions">
                    <!-- AI Status -->
                    <div class="ai-status-indicator">
                        <span id="ai-status-icon" style="font-size: 1rem;">🟡</span>
                        <span id="ai-status-text" style="font-size: 0.7rem;">проверка...</span>
                    </div>
                    
                    <!-- Селектор моделей -->
                    <div class="model-selector">
                        <select id="chat-model-select" title="Модель для чата">
                            <option value="">Загрузка...</option>
                        </select>
                        <select id="vision-model-select" title="Модель для изображений">
                            <option value="">Загрузка...</option>
                        </select>
                    </div>
                    
                    <!-- AI Switch -->
                    <label class="ai-switch">
                        <input type="checkbox" id="ai-enabled-toggle" checked>
                        <span class="slider"></span>
                    </label>
                    
                    <button id="info-toggle" class="icon-btn desktop-only" style="font-size:1.2rem;">ℹ️</button>
                </div>
            </header>

            <div id="messages-container" class="messages-area">
                <div style="text-align:center; margin-top:50px;">
                    <div style="font-size:3rem;">🤖</div>
                    <h3>Gemma 4 Assistant</h3>
                    <p>Выберите чат чтобы начать общение</p>
                </div>
            </div>
            
            <div id="typing-indicator" class="typing-indicator hidden">
                <div class="message ai">
                    <div class="msg-sender" style="color: #e53935;">Gemma AI</div>
                    <div class="msg-content">
                        <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <button class="tool-btn active" data-mode="chat">💬</button>
                <button class="tool-btn" data-mode="image">🖼️</button>
                <button class="tool-btn" data-mode="audio">🎙️</button>
                <button class="tool-btn" data-mode="observer">👁️</button>
            </div>

            <footer class="input-area">
                <div id="chat-input-container" class="input-wrapper">
                    <textarea id="message-input" placeholder="Сообщение..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
                
                <div id="image-input-container" class="input-wrapper hidden">
                    <input type="file" id="image-file" multiple accept="image/*" style="display:none;">
                    <label for="image-file" style="padding:10px; background:#3390ec; border-radius:8px; cursor:pointer; color:white;">Выбрать фото</label>
                    <div id="image-preview-container" style="display:flex; gap:5px;"></div>
                    <button id="upload-image-btn" class="send-btn">Отправить</button>
                </div>

                <div id="audio-input-container" class="input-wrapper hidden">
                    <input type="file" id="audio-file" accept="audio/*" style="display:none;">
                    <label for="audio-file" style="padding:10px; background:#3390ec; border-radius:8px; cursor:pointer; color:white;">Выбрать аудио</label>
                    <button id="upload-audio-btn" class="send-btn">Обработать</button>
                </div>

                <div id="observer-input-container" class="input-wrapper hidden">
                    <p style="width:100%; text-align:center; color:#707579;">Нажмите ℹ️ или 👁️ для просмотра анализа</p>
                </div>
            </footer>
        </main>

        <!-- Правая панель -->
        <aside class="right-panel" id="right-panel">
            <div class="panel-header" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Информация</h3>
                <button id="close-right-panel" class="icon-btn mobile-only">✕</button>
            </div>
            
            <div class="panel-content">
                <div id="observer-section" style="margin-bottom:20px;">
                    <h4>👁️ Анализ диалога</h4>
                    <select id="observer-role" style="width:100%; padding:8px; margin-bottom:10px; border-radius:6px; background:#0f3460; color:white; border:1px solid #e94560;">
                        <option value="Критик">🔍 Критик</option>
                        <option value="Саммаризатор">📋 Саммари</option>
                        <option value="Психолог">🧠 Психолог</option>
                    </select>
                    <button id="analyze-btn" style="width:100%; padding:8px; background:#3390ec; color:white; border:none; border-radius:6px; cursor:pointer;">Запустить анализ</button>
                    
                    <div id="observer-results-container" class="results-box hidden">
                        <div id="observer-analysis-result"></div>
                    </div>
                </div>

                <hr style="border:0; border-top:1px solid #0f3460; margin:15px 0;">

                <div id="members-section" class="hidden">
                    <h4>Участники</h4>
                    <div id="members-list"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" id="invite-login-input" placeholder="Логин" style="flex:1; padding:5px; background:#0f3460; color:white; border:1px solid #e94560; border-radius:4px;">
                        <button id="invite-user-btn" class="btn-sm">+</button>
                    </div>
                </div>
                
                <div id="invitations-section" style="margin-top:20px;">
                    <h4>Приглашения</h4>
                    <div id="invitations-list"></div>
                </div>
            </div>
        </aside>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>

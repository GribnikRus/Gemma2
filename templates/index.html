<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--tg-bg);
            color: var(--tg-text);
            height: 100vh;
            overflow: hidden;
        }

        /* Telegram Color Scheme */
        :root {
            --tg-bg: #0a0a0a;
            --tg-sidebar: #1f1f1f;
            --tg-header: #1f1f1f;
            --tg-hover: #2b2b2b;
            --tg-active: #2b5278;
            --tg-selected: #2b5278;
            --tg-message-user: #2b5278;
            --tg-message-ai: #1f1f1f;
            --tg-text: #ffffff;
            --tg-text-secondary: #8e8e93;
            --tg-border: #2b2b2b;
            --tg-accent: #3390ec;
            --tg-online: #31b545;
        }

        #app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--tg-bg);
        }

        /* Sidebar - Telegram Style */
        .sidebar {
            width: 320px;
            background: var(--tg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--tg-border);
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--tg-border);
            background: var(--tg-sidebar);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: var(--tg-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .user-status {
            font-size: 0.75rem;
            color: var(--tg-text-secondary);
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--tg-hover);
            color: var(--tg-text);
        }

        /* Search */
        .search-container {
            padding: 12px 16px;
            border-bottom: 1px solid var(--tg-border);
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--tg-hover);
            border: none;
            border-radius: 10px;
            color: var(--tg-text);
            font-size: 0.9rem;
        }

        .search-input::placeholder {
            color: var(--tg-text-secondary);
        }

        /* Chat List */
        .chat-list-container {
            flex: 1;
            overflow-y: auto;
        }

        .section-title {
            padding: 16px 16px 8px 16px;
            color: var(--tg-text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .chat-item, .group-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .chat-item:hover, .group-item:hover {
            background: var(--tg-hover);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--tg-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .group-avatar {
            background: #4a4a4a;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 0.8rem;
            color: var(--tg-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--tg-bg);
        }

        .chat-header {
            padding: 10px 16px;
            background: var(--tg-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--tg-border);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: var(--tg-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .chat-header-details h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .chat-header-details span {
            font-size: 0.7rem;
            color: var(--tg-text-secondary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Model Selectors - Telegram Style */
        .model-selector {
            display: flex;
            gap: 6px;
        }

        .model-selector select {
            background: var(--tg-hover);
            color: var(--tg-text);
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .model-selector select:hover {
            background: #3a3a3a;
        }

        /* AI Switch - Telegram Style */
        .ai-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .ai-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #4a4a4a;
            transition: 0.2s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--tg-accent);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* AI Status */
        .ai-status {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--tg-hover);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .ai-status span:first-child {
            font-size: 0.9rem;
        }

        .ai-status span:last-child {
            font-size: 0.7rem;
            color: var(--tg-text-secondary);
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 16px;
            position: relative;
        }

        .message.user {
            align-self: flex-end;
            background: var(--tg-message-user);
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--tg-message-ai);
            border-bottom-left-radius: 4px;
        }

        .msg-sender {
            font-size: 0.7rem;
            margin-bottom: 4px;
        }

        .msg-content {
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-time {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            padding: 8px 16px;
        }

        .typing-indicator.hidden {
            display: none;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: var(--tg-message-ai);
            border-radius: 16px;
            width: fit-content;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--tg-text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px;
            background: var(--tg-sidebar);
            border-top: 1px solid var(--tg-border);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--tg-hover);
            border-radius: 24px;
            padding: 8px 12px;
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--tg-text);
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            max-height: 100px;
        }

        textarea::placeholder {
            color: var(--tg-text-secondary);
        }

        textarea:focus {
            outline: none;
        }

        .send-btn {
            background: var(--tg-accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #4a9eff;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            background: var(--tg-sidebar);
            border-top: 1px solid var(--tg-border);
        }

        .tool-btn {
            padding: 8px 16px;
            background: none;
            color: var(--tg-text-secondary);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: var(--tg-hover);
            color: var(--tg-text);
        }

        .tool-btn.active {
            background: var(--tg-accent);
            color: white;
        }

        /* Right Panel */
        .right-panel {
            width: 320px;
            background: var(--tg-sidebar);
            border-left: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 1000;
        }

        .right-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--tg-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Online Status */
        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--tg-online);
            border-radius: 50%;
            display: inline-block;
        }

        /* Overlay for mobile */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 900;
        }

        .overlay.active {
            display: block;
        }

        /* Mobile */
        .mobile-only {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -320px;
                top: 0;
                bottom: 0;
                z-index: 1001;
            }
            .sidebar.open {
                transform: translateX(320px);
            }
            .mobile-only {
                display: flex;
            }
            .right-panel {
                width: 100%;
            }
            .message {
                max-width: 85%;
            }
        }

        .hidden {
            display: none;
        }

        .btn-sm {
            background: var(--tg-accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .results-box {
            background: var(--tg-hover);
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
        }

        select {
            background: var(--tg-hover);
            color: var(--tg-text);
            border: none;
            border-radius: 8px;
            padding: 8px;
        }

        hr {
            border-color: var(--tg-border);
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="overlay" id="overlay"></div>
        
        <!-- Sidebar (Chat List) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name" id="user-display">User</div>
                        <div class="user-status">Online</div>
                    </div>
                </div>
                <button id="logout-btn" class="icon-btn" title="Выйти">🚪</button>
            </div>
            
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Поиск..." id="search-input">
            </div>
            
            <div class="chat-list-container">
                <div class="section-title">ЧАТЫ</div>
                <div id="chats-list"></div>
                
                <div class="section-title">ГРУППЫ</div>
                <div id="groups-list"></div>
                
                <div style="padding: 16px;">
                    <div style="display:flex; gap:8px; margin-bottom: 16px;">
                        <input type="text" id="new-group-name" placeholder="Название группы" style="flex:1; padding:8px; background:var(--tg-hover); border:none; border-radius:8px; color:white;">
                        <button id="create-group-btn" class="btn-sm">Создать</button>
                    </div>
                </div>
                
                <div class="section-title">ОНЛАЙН</div>
                <ul id="users-list-container" style="list-style:none; padding:0 16px 16px 16px;"></ul>
            </div>
            
            <button id="new-chat-btn" style="position:absolute; bottom:20px; right:20px; width:52px; height:52px; border-radius:50%; background:var(--tg-accent); color:white; border:none; font-size:1.5rem; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.3);">✏️</button>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-chat">
            <header class="chat-header">
                <div class="chat-header-info">
                    <button id="menu-toggle" class="icon-btn mobile-only" style="margin-right:0;">☰</button>
                    <div class="chat-header-avatar" id="chat-avatar">🤖</div>
                    <div class="chat-header-details">
                        <h3 id="current-chat-title">Выберите чат</h3>
                        <span id="chat-status">Нажмите для начала</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="ai-status">
                        <span id="ai-status-icon">🟡</span>
                        <span id="ai-status-text">проверка</span>
                    </div>
                    
                    <div class="model-selector">
                        <select id="chat-model-select" title="Модель для чата">
                            <option value="">Загрузка...</option>
                        </select>
                        <select id="vision-model-select" title="Модель для изображений">
                            <option value="">Загрузка...</option>
                        </select>
                    </div>
                    
                    <label class="ai-switch">
                        <input type="checkbox" id="ai-enabled-toggle" checked>
                        <span class="slider"></span>
                    </label>
                    
                    <button id="info-toggle" class="icon-btn" title="Информация">ℹ️</button>
                </div>
            </header>

            <div id="messages-container" class="messages-area">
                <div style="text-align:center; margin-top:50px; color:var(--tg-text-secondary);">
                    <div style="font-size:4rem; margin-bottom:16px;">🤖</div>
                    <h3 style="margin-bottom:8px;">Gemma 4 Assistant</h3>
                    <p>Выберите чат чтобы начать общение</p>
                </div>
            </div>
            
            <div id="typing-indicator" class="typing-indicator hidden">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="toolbar">
                <button class="tool-btn active" data-mode="chat">💬 Чат</button>
                <button class="tool-btn" data-mode="image">🖼️ Изо</button>
                <button class="tool-btn" data-mode="audio">🎙️ Аудио</button>
                <button class="tool-btn" data-mode="observer">👁️ Анализ</button>
            </div>

            <footer class="input-area">
                <div id="chat-input-container" class="input-wrapper">
                    <textarea id="message-input" placeholder="Сообщение..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
                
                <div id="image-input-container" class="input-wrapper hidden">
                    <input type="file" id="image-file" multiple accept="image/*" style="display:none;">
                    <label for="image-file" style="cursor:pointer; color:var(--tg-accent);">📎 Выбрать фото</label>
                    <div id="image-preview-container" style="display:flex; gap:5px;"></div>
                    <button id="upload-image-btn" class="send-btn">📤</button>
                </div>

                <div id="audio-input-container" class="input-wrapper hidden">
                    <input type="file" id="audio-file" accept="audio/*" style="display:none;">
                    <label for="audio-file" style="cursor:pointer; color:var(--tg-accent);">🎵 Выбрать аудио</label>
                    <button id="upload-audio-btn" class="send-btn">🎧</button>
                </div>

                <div id="observer-input-container" class="input-wrapper hidden">
                    <p style="color:var(--tg-text-secondary);">Нажмите ℹ️ для анализа</p>
                </div>
            </footer>
        </main>

        <!-- Right Panel (Info) -->
        <aside class="right-panel" id="right-panel">
            <div class="panel-header">
                <h3>Информация</h3>
                <button id="close-right-panel" class="icon-btn">✕</button>
            </div>
            
            <div class="panel-content">
                <div id="observer-section" style="margin-bottom:20px;">
                    <h4 style="margin-bottom:12px;">👁️ Анализ диалога</h4>
                    <select id="observer-role" style="width:100%; margin-bottom:12px;">
                        <option value="Критик">🔍 Критик</option>
                        <option value="Саммаризатор">📋 Саммари</option>
                        <option value="Психолог">🧠 Психолог</option>
                    </select>
                    <button id="analyze-btn" class="btn-sm" style="width:100%;">Запустить анализ</button>
                    
                    <div id="observer-results-container" class="results-box hidden">
                        <div id="observer-analysis-result"></div>
                    </div>
                </div>

                <hr style="margin:16px 0;">

                <div id="members-section" class="hidden">
                    <h4 style="margin-bottom:12px;">👥 Участники</h4>
                    <div id="members-list"></div>
                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <input type="text" id="invite-login-input" placeholder="Логин" style="flex:1; padding:8px; background:var(--tg-hover); border:none; border-radius:8px; color:white;">
                        <button id="invite-user-btn" class="btn-sm">Пригласить</button>
                    </div>
                </div>
                
                <div id="invitations-section" style="margin-top:20px;">
                    <h4 style="margin-bottom:12px;">📨 Приглашения</h4>
                    <div id="invitations-list"></div>
                </div>
            </div>
        </aside>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>

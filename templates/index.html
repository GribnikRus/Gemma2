<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma Hub</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Авторизация -->
    <div id="auth-modal" class="modal">
        <div class="auth-box">
            <h2>Gemma Hub</h2>
            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Логин" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary" style="width:100%; padding:10px; background:#3390ec; color:white; border:none; border-radius:8px;">Войти</button>
                <div id="login-error" class="error" style="color:red; font-size:0.8rem;"></div>
            </form>
            <form id="register-form" class="hidden">
                <input type="text" id="register-username" placeholder="Логин" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary" style="width:100%; padding:10px; background:#3390ec; color:white; border:none; border-radius:8px;">Создать</button>
                <div id="register-error" class="error" style="color:red; font-size:0.8rem;"></div>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div class="overlay" id="overlay"></div>
        
        <!-- Левая панель: Чаты и Список пользователей -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">U</div>
                    <span id="user-display">User</span>
                </div>
                <button id="logout-btn" class="icon-btn">🚪</button>
            </div>
            
            <div class="chat-list-container">
                <h4 style="padding:5px; color:#707579;">ЧАТЫ</h4>
                <div id="chats-list"></div>
                
                <h4 style="padding:5px; color:#707579; margin-top:15px;">ГРУППЫ</h4>
                <div id="groups-list"></div>
                <div style="display:flex; gap:5px; padding:5px; margin-top:5px;">
                    <input type="text" id="new-group-name" placeholder="Название группы" style="flex:1; padding:5px; border-radius:4px; border:1px solid #ddd;">
                    <button id="create-group-btn" class="btn-sm" style="background:#3390ec; color:white; border:none; padding:5px 10px; border-radius:4px;">+</button>
                </div>
                
                <h4 style="padding:5px; color:#707579; margin-top:15px;">ОНЛАЙН</h4>
                <ul id="users-list-container" class="online-list" style="list-style:none; padding:5px;"></ul>
            </div>
            <button id="new-chat-btn" class="fab" style="position:absolute; bottom:20px; right:20px; width:50px; height:50px; border-radius:50%; background:#3390ec; color:white; border:none; font-size:1.5rem;">✏️</button>
        </aside>

        <!-- Центр: Чат -->
        <main class="main-chat">
            <header class="chat-header">
                <button id="menu-toggle" class="icon-btn mobile-only" style="font-size:1.5rem; margin-right:10px;">☰</button>
                <div class="chat-info">
                    <h3 id="current-chat-title">Выберите чат</h3>
                    <span id="chat-status" class="status-text"></span>
                </div>
                <div class="header-actions">
                    <label class="ai-switch" title="Ответы ИИ" style="margin-right:10px; display:inline-block; width:40px; height:20px; background:#ccc; border-radius:20px; position:relative;">
                        <input type="checkbox" id="ai-enabled-toggle" checked style="opacity:0; width:0; height:0;">
                        <span class="slider" style="position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:.4s; border-radius:20px;"></span>
                    </label>
                    <button id="info-toggle" class="icon-btn desktop-only" style="font-size:1.2rem;">ℹ️</button>
                </div>
            </header>

            <div id="messages-container" class="messages-area">
                <div class="welcome-screen" style="text-align:center; margin-top:50px; color:white;">
                    <div style="font-size:3rem;">🤖</div>
                    <h3>Gemma 4 Assistant</h3>
                </div>
            </div>

            <!-- Панель режимов -->
            <div class="toolbar">
                <button class="tool-btn active" data-mode="chat">💬</button>
                <button class="tool-btn" data-mode="image">🖼️</button>
                <button class="tool-btn" data-mode="audio">🎙️</button>
                <button class="tool-btn" data-mode="observer">👁️</button>
            </div>

            <!-- Область ввода -->
            <footer class="input-area">
                <!-- Чат -->
                <div id="chat-input-container" class="input-wrapper">
                    <textarea id="message-input" placeholder="Сообщение..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
                
                <!-- Картинки -->
                <div id="image-input-container" class="input-wrapper hidden">
                    <input type="file" id="image-file" multiple accept="image/*" style="display:none;">
                    <label for="image-file" class="btn-primary" style="padding:10px; border-radius:8px; cursor:pointer;">Выбрать фото</label>
                    <div id="image-preview-container" style="display:flex; gap:5px;"></div>
                    <button id="upload-image-btn" class="send-btn" style="width:auto; border-radius:8px; padding:0 15px;">Отправить</button>
                </div>

                <!-- Аудио -->
                <div id="audio-input-container" class="input-wrapper hidden">
                     <input type="file" id="audio-file" accept="audio/*" style="display:none;">
                     <label for="audio-file" class="btn-primary" style="padding:10px; border-radius:8px; cursor:pointer;">Выбрать аудио</label>
                     <button id="upload-audio-btn" class="send-btn" style="width:auto; border-radius:8px; padding:0 15px;">Обработать</button>
                     <div id="audio-results-container" class="results-box hidden" style="position:absolute; bottom:70px; left:10px; right:10px; background:white;"></div>
                </div>

                <!-- Наблюдатель (Кнопка просто открывает правую панель) -->
                <div id="observer-input-container" class="input-wrapper hidden">
                    <p style="width:100%; text-align:center; color:#707579;">Нажмите ℹ️ или 👁️ для просмотра анализа</p>
                </div>
            </footer>
        </main>

        <!-- Правая панель: Инфо, Участники и РЕЗУЛЬТАТЫ НАБЛЮДАТЕЛЯ -->
        <aside class="right-panel" id="right-panel">
            <div class="panel-header">
                <h3>Информация</h3>
                <button id="close-right-panel" class="icon-btn mobile-only">✕</button>
            </div>
            
            <div class="panel-content">
                <!-- Блок Наблюдателя -->
                <div id="observer-section" style="margin-bottom:20px;">
                    <h4>👁️ Анализ диалога</h4>
                    <select id="observer-role" style="width:100%; padding:8px; margin-bottom:10px; border-radius:6px; border:1px solid #ddd;">
                        <option value="Критик">🔍 Критик</option>
                        <option value="Саммаризатор">📋 Саммари</option>
                        <option value="Психолог">🧠 Психолог</option>
                    </select>
                    <button id="analyze-btn" class="btn-primary" style="width:100%; padding:8px; background:#3390ec; color:white; border:none; border-radius:6px;">Запустить анализ</button>
                    
                    <div id="observer-results-container" class="results-box hidden" style="margin-top:10px;">
                        <div id="observer-analysis-result"></div>
                    </div>
                </div>

                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">

                <!-- Участники группы -->
                <div id="members-section" class="hidden">
                    <h4>Участники</h4>
                    <div id="members-list"></div>
                    <div class="invite-box" style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" id="invite-login-input" placeholder="Логин" style="flex:1; padding:5px;">
                        <button id="invite-user-btn" class="btn-sm" style="background:#3390ec; color:white; border:none; padding:5px 10px; border-radius:4px;">+</button>
                    </div>
                </div>
                
                <div id="invitations-section" style="margin-top:20px;">
                    <h4>Приглашения</h4>
                    <div id="invitations-list"></div>
                </div>
            </div>
        </aside>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>

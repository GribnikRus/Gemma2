<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Hub - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
        }
        h1 { text-align: center; margin-bottom: 30px; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #5a67d8; }
        .error { color: red; margin-top: 10px; text-align: center; }
        .hidden { display: none; }
        .debug {
            background: #f0f0f0;
            padding: 10px;
            margin-top: 20px;
            font-size: 12px;
            border-radius: 8px;
            color: #333;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🤖 Gemma Hub</h1>
        
        <div id="login-panel">
            <input type="text" id="login-username" placeholder="Логин" value="Gribnik1">
            <input type="password" id="login-password" placeholder="Пароль">
            <button id="login-btn">Войти</button>
            <div id="login-error" class="error"></div>
        </div>
        
        <div id="register-panel" style="margin-top: 20px; text-align: center;">
            <p>Нет аккаунта? <button id="show-register" style="width: auto; padding: 5px 10px;">Зарегистрироваться</button></p>
        </div>
        
        <div id="register-form" class="hidden" style="margin-top: 20px;">
            <input type="text" id="reg-username" placeholder="Логин (мин 3 символа)">
            <input type="password" id="reg-password" placeholder="Пароль (мин 6 символов)">
            <button id="register-btn">Зарегистрироваться</button>
            <div id="register-error" class="error"></div>
            <button id="back-to-login" style="margin-top: 10px; background: #ccc;">Назад</button>
        </div>
        
        <div class="debug" id="debug-info">
            Проверка соединения...
        </div>
    </div>

    <script>
        const debugDiv = document.getElementById('debug-info');
        
        function logDebug(msg) {
            console.log(msg);
            debugDiv.innerHTML += '<br>' + msg;
        }
        
        logDebug('=== PAGE LOADED ===');
        logDebug('Current URL: ' + window.location.href);
        
        // Проверка соединения с сервером
        async function testConnection() {
            logDebug('Testing connection to /api/auth/me...');
            try {
                const response = await fetch('/api/auth/me');
                logDebug('Response status: ' + response.status);
                if (response.ok) {
                    const data = await response.json();
                    logDebug('✅ Already logged in as: ' + data.login);
                    logDebug('Redirecting to /');
                    window.location.href = '/';
                } else {
                    logDebug('❌ Not logged in');
                }
            } catch (err) {
                logDebug('❌ Connection failed: ' + err.message);
                logDebug('Trying absolute URL...');
                try {
                    const response = await fetch(window.location.origin + '/api/auth/me');
                    logDebug('Absolute URL response status: ' + response.status);
                } catch (err2) {
                    logDebug('❌ Absolute URL also failed: ' + err2.message);
                }
            }
        }
        
        // Переключение панелей
        document.getElementById('show-register').onclick = () => {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('register-form').classList.remove('hidden');
        };
        
        document.getElementById('back-to-login').onclick = () => {
            document.getElementById('login-panel').style.display = 'block';
            document.getElementById('register-form').classList.add('hidden');
        };
        
        // Логин
        document.getElementById('login-btn').onclick = async () => {
            const login = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            
            logDebug('=== LOGIN ATTEMPT ===');
            logDebug('Login: ' + login);
            
            errorDiv.textContent = 'Вход...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });
                
                logDebug('Response status: ' + response.status);
                const data = await response.json();
                logDebug('Response data: ' + JSON.stringify(data));
                
                if (!response.ok) {
                    throw new Error(data.error || 'Ошибка входа');
                }
                
                logDebug('✅ Login successful, redirecting to /');
                window.location.href = '/';
                
            } catch (err) {
                logDebug('❌ Login error: ' + err.message);
                errorDiv.textContent = err.message;
            }
        };
        
        // Регистрация
        document.getElementById('register-btn').onclick = async () => {
            const login = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('register-error');
            
            if (login.length < 3) {
                errorDiv.textContent = 'Логин должен быть минимум 3 символа';
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = 'Пароль должен быть минимум 6 символов';
                return;
            }
            
            errorDiv.textContent = 'Регистрация...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Ошибка регистрации');
                }
                
                alert('Регистрация успешна! Теперь войдите.');
                document.getElementById('back-to-login').click();
                document.getElementById('login-username').value = login;
                
            } catch (err) {
                errorDiv.textContent = err.message;
            }
        };
        
        // Запуск проверки
        testConnection();
    </script>
</body>
</html>

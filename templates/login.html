<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Hub - Вход</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h1>Gemma Hub</h1>
        <p class="subtitle">Ваш персональный AI ассистент</p>
        
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>
        
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="login-username">Логин</label>
                <input type="text" id="login-username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="login-password">Пароль</label>
                <input type="password" id="login-password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary full-width">Войти</button>
            <div id="login-error" class="error-message"></div>
        </form>
        
        <form id="register-form" class="auth-form hidden">
            <div class="form-group">
                <label for="register-username">Логин</label>
                <input type="text" id="register-username" required minlength="3" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="register-password">Пароль</label>
                <input type="password" id="register-password" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary full-width">Зарегистрироваться</button>
            <div id="register-error" class="error-message"></div>
        </form>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
